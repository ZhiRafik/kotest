spring:
  application:
    name: kotest

  datasource:
    url: jdbc:postgresql://localhost:5432/kotest
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  session:
    store-type: none
    timeout: 30m

  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: lax
        max-age: 1800

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m
      cookie:
        name: KOTEST_SESSION

logging:
  level:
    ru.kotest: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true